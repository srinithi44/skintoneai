services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: makeup-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENWEATHER_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # Set to your frontend Render URL

  # ── Frontend (Vite + React) ────────────────────────────────────────────────
  - type: web
    name: makeup-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false        # Set to your backend Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
